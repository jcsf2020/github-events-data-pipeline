name: Python Tests

on:
  push:
    branches:
      - main
      - "feat/**"
      - "chore/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest
          uv pip install --system apache-airflow

      - name: Run tests
        run: python -m pytest tests

      - name: Validate Airflow DAG import
        run: python -c "from orchestration.github_events_dag import dag"
